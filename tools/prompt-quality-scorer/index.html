<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt Quality Scorer — Free Tool | Demaciains</title>
<meta name="description" content="Score your AI prompts on clarity, specificity, structure, and effectiveness. Free prompt engineering tool. Improve your ChatGPT/Claude prompts instantly.">
<meta name="keywords" content="prompt engineering, AI prompt scorer, ChatGPT prompt optimizer, prompt quality tool">
<link rel="canonical" href="https://drgalio.github.io/demaciains-paywall/tools/prompt-quality-scorer/">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
h1{font-size:2.5rem;background:linear-gradient(135deg,#06b6d4,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.subtitle{color:#888;font-size:1.1rem;margin-bottom:30px}
textarea{width:100%;height:180px;padding:16px;border-radius:12px;border:1px solid #333;background:#151520;color:#fff;font-size:1rem;font-family:inherit;resize:vertical;margin-bottom:12px}
textarea:focus{outline:none;border-color:#06b6d4}
button{padding:14px 32px;border-radius:12px;border:none;background:linear-gradient(135deg,#06b6d4,#8b5cf6);color:#fff;font-size:1rem;font-weight:600;cursor:pointer}
.score-display{text-align:center;margin:30px 0}
.score-big{font-size:5rem;font-weight:800}
.score-sub{color:#888;font-size:1.1rem;margin-top:5px}
.dimensions{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin:25px 0}
.dim{background:#151520;border:1px solid #222;border-radius:12px;padding:18px}
.dim-name{font-size:.8rem;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.dim-score{font-size:1.8rem;font-weight:700}
.dim-bar{height:4px;background:#222;border-radius:2px;margin-top:8px;overflow:hidden}
.dim-fill{height:100%;border-radius:2px;transition:width .6s}
.dim-tip{font-size:.78rem;color:#aaa;margin-top:6px}
.improvements{background:#151520;border:1px solid #222;border-radius:12px;padding:24px;margin-top:20px}
.improvements h3{color:#06b6d4;margin-bottom:15px}
.imp-item{padding:10px 0;border-bottom:1px solid #1a1a1a}
.imp-item:last-child{border:none}
.imp-label{font-weight:600;margin-bottom:4px}
.imp-detail{color:#aaa;font-size:.9rem}
.cta-banner{margin-top:50px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #333;border-radius:16px;padding:30px;text-align:center}
.cta-banner h3{color:#06b6d4;margin-bottom:10px}
.cta-banner p{color:#aaa;margin-bottom:20px}
.cta-btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#06b6d4,#8b5cf6);color:#fff;border-radius:10px;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="container">
<h1>🎯 AI Prompt Quality Scorer</h1>
<p class="subtitle">Paste your prompt to get instant quality feedback across 5 dimensions.</p>
<textarea id="prompt" placeholder="Paste your AI prompt here..."></textarea>
<button onclick="score()">Score My Prompt</button>
<div id="results"></div>
<div class="cta-banner">
<h3>Want prompts that actually deliver results?</h3>
<p>Get our curated Prompt Packs — 50 battle-tested prompts for freelancers, e-commerce, and creators. $19.</p>
<a href="https://drgalio.github.io/demaciains-paywall/" class="cta-btn">Get Prompt Packs →</a>
</div>
</div>

<script>
function score(){
const p=document.getElementById('prompt').value.trim();
if(!p)return;
const len=p.length;
const words=p.split(/\s+/).length;
const sentences=p.split(/[.!?]+/).filter(s=>s.trim()).length;

// Dimensions
const clarity=len>20&&len<2000?Math.min(95,40+words*2):len<=20?15:30;
const specificity=(p.includes('specific')||p.includes('exactly')||p.includes('must')||p.includes('should')||p.includes('format')||p.includes('example'))?80:40;
const hasRole=p.toLowerCase().includes('you are')||p.toLowerCase().includes('act as')||p.toLowerCase().as('role')?85:35;
const hasFormat=p.includes('```')||p.includes('JSON')||p.includes('CSV')||p.includes('markdown')||p.includes('list')||p.includes('table')||p.toLowerCase().includes('format')?80:30;
const structure=(p.includes('\n')&&sentences>=3)?85:sentences>=2?60:30;

const overall=Math.round((clarity+specificity+hasRole+hasFormat+structure)/5);
const color=overall>=70?'#4ade80':overall>=40?'#fbbf24':'#ef4444';

const dims=[
{name:'Clarity',score:clarity,tip:clarity<50?'Add more detail and context':'Clear and detailed'},
{name:'Specificity',score:specificity,tip:specificity<60?'Add specific requirements or constraints':'Well-specified'},
{name:'Role/Context',score:hasRole,tip:hasRole<50?'Add "You are a..." or context about the AI\'s role':'Good role context'},
{name:'Output Format',score:hasFormat,tip:hasFormat<50?'Specify desired output format (JSON, list, etc.)':'Format specified'},
{name:'Structure',score:structure,tip:structure<50?'Use paragraphs, bullet points, or numbered steps':'Well-structured'}
];

document.getElementById('results').innerHTML=`
<div class="score-display">
<div class="score-big" style="color:${color}">${overall}<span style="font-size:2rem;color:#888">/100</span></div>
<div class="score-sub">${overall>=70?'Excellent prompt!':overall>=40?'Good — room for improvement':'Needs significant improvement'}</div>
</div>
<div class="dimensions">${dims.map(d=>{
const dc=d.score>=70?'#4ade80':d.score>=40?'#fbbf24':'#ef4444';
return`<div class="dim"><div class="dim-name">${d.name}</div><div class="dim-score" style="color:${dc}">${d.score}</div><div class="dim-bar"><div class="dim-fill" style="width:${d.score}%;background:${dc}"></div></div><div class="dim-tip">${d.tip}</div></div>`;
}).join('')}</div>
<div class="improvements"><h3>💡 How to Improve</h3>
${dims.filter(d=>d.score<60).map(d=>`<div class="imp-item"><div class="imp-label">${d.name}: ${d.score}/100</div><div class="imp-detail">${d.tip}</div></div>`).join('')}
${overall>=70?'<div class="imp-item"><div class="imp-label">Great prompt!</div><div class="imp-detail">Consider testing variations to optimize further.</div></div>':''}
</div>`;
}

document.getElementById('prompt').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)score()});
</script>
</body>
</html>
