<style>
*{box-sizing:border-box;margin:0;padding:0}

.copy-area textarea{width:100%;height:100px;background:#0a0a0f;border:1px solid #333;border-radius:8px;color:#fff;padding:12px;font-family:inherit;resize:none}
.copy-btn{display:inline-block;margin-top:10px;padding:10px 20px;border:1px solid #e1306c;color:#e1306c;border-radius:8px;cursor:pointer;background:none}

</style>
</head>
<body>
<div class="container">
<h1>#️⃣ Hashtag Generator</h1>
<p class="subtitle">Generate trending hashtags for Instagram, TikTok, Twitter & LinkedIn.</p>
<div class="input-row">
<input type="text" id="topic" placeholder="Enter your topic (e.g. fitness, travel, tech)...">
<select id="platform"><option value="instagram">Instagram</option><option value="tiktok">TikTok</option><option value="twitter">Twitter/X</option><option value="linkedin">LinkedIn</option></select>
<button onclick="generate()">Generate Hashtags</button>
</div>
<div id="results"></div>
<div class="cta-banner">
<h3>Master the algorithm with our guides</h3>
<p>Get platform-specific algorithm reverse-engineering reports. Know exactly what gets ranked. $29 each.</p>
<a href="https://drgalio.github.io/demaciains-paywall/" class="cta-btn">Get Algorithm Guides →</a>
</div>
</div>

<script>
const hashtagDB={
fitness:['#fitness','#workout','#gym','#fit','#health','#motivation','#fitnessmotivation','#training','#lifestyle','#bodybuilding','#healthylifestyle','#exercise','#muscle','#crossfit','#yoga','#cardio','#nutrition','#personaltrainer','#gymlife','#strong','#fitspo','#weightloss','#wellness','#abs','#protein','#fitfam','#instafit','#homeworkout','#running','#fitlife'],
travel:['#travel','#wanderlust','#adventure','#vacation','#explore','#travelgram','#instatravel','#traveling','#trip','#holiday','#travelphotography','#traveler','#nature','#photography','#beautiful','#photooftheday','#love','#landscape','#sunset','#beach','#mountains','#backpacking','#worldtravel','#tourism','#travellife','#traveladdict','#roadtrip','#travelblogger','#bucketlist','#paradise'],
tech:['#tech','#technology','#programming','#coding','#developer','#software','#ai','#machinelearning','#webdev','#startup','#javascript','#python','#datascience','#cybersecurity','#blockchain','#iot','#cloud','#devops','#opensource','#innovation','#code','#computerscience','#engineering','#gadgets','#digital','#automation','#robotics','#app','#webdevelopment','#techtrends'],
food:['#food','#foodie','#yummy','#foodporn','#instafood','#foodphotography','#delicious','#homemade','#cooking','#foodstagram','#healthyfood','#dinner','#lunch','#breakfast','#chef','#restaurant','#foodblogger','#recipe','#dessert','#baking','#vegan','#organic','#tasty','#eat','#kitchen','#yummyfood','#foodlover','#streetfood','#brunch','#gourmet'],
business:['#business','#entrepreneur','#marketing','#success','#startup','#money','#motivation','#digitalmarketing','#entrepreneurship','#socialmedia','#branding','#smallbusiness','#hustle','#leadership','#ecommerce','#sales','#growth','#strategy','#investment','#onlinebusiness','#sidehustle','#networking','#goals','#productivity','#mindset','#finance','#consulting','#b2b','#funding','#scaling'],
fashion:['#fashion','#style','#ootd','#fashionista','#instafashion','#outfit','#clothing','#streetstyle','#fashionblogger','#beauty','#trendy','#look','#moda','#fashionstyle','#womensfashion','#mensfashion','#shopping','#accessories','#design','#outfitoftheday','#stylish','#fashionphotography','#luxury','#chic','#vintage','#sustainablefashion','#runway','#couture','#fashiondesign','#trendsetter'],
music:['#music','#musician','#singer','#songwriter','#producer','#hiphop','#rap','#rock','#pop','#dj','#beats','#studio','#guitar','#piano','#vocals','#recording','#artist','#album','#concert','#livemusic','#indie','#electronic','#rnb','#jazz','#classical','#band','#soundcloud','#spotify','#newmusic','#musicproducer'],
fitness_gym:['#gym','#workout','#fitness','#gains','#legday','#chestday','#armday','#backday','#shoulderday','#squat','#deadlift','#benchpress','#bodybuilding','#powerlifting','#strength','#muscle','#iron','#pump','#reps','#sets','#protein','#preworkout','#shredded','#bulk','#cut','#ripped','#aesthetic','#physique','#classic','#mass'],
education:['#education','#learning','#student','#school','#study','#teacher','#university','#college','#knowledge','#science','#math','#reading','#books','#onlinelearning','#tutorial','#courses','#homework','#exam','#academic','#research','#stem','#scholarship','#language','#literature','#history','#geography','#physics','#chemistry','#biology','#degree'],
health:['#health','#wellness','#healthy','#mentalhealth','#selfcare','#healthylifestyle','#nutrition','#fitness','#mindfulness','#meditation','#healthcare','#healing','#therapy','#anxiety','#depression','#wellbeing','#holistic','#natural','#organic','#exercise','#sleep','#stress','#selflove','#motivation','#lifestyle','#body','#mind','#soul','#balance','#vitality']
};

const popularity={instagram:{'100k+':0.15,'50k-100k':0.25,'10k-50k':0.35,'1k-10k':0.2,'<1k':0.05},tiktok:{'1M+':0.1,'100k-1M':0.2,'10k-100k':0.35,'1k-10k':0.25,'<1k':0.1},twitter:{'100k+':0.2,'10k-100k':0.3,'1k-10k':0.3,'<1k':0.2},linkedin:{'50k+':0.15,'10k-50k':0.25,'1k-10k':0.35,'<1k':0.25}};
const limits={instagram:30,tiktok:5,twitter:3,linkedin:5};

function seeded(s){return function(){s=(s*16807+0)%2147483647;return(s-1)/2147483646}}

function generate(){
const topic=document.getElementById('topic').value.trim().toLowerCase();
const platform=document.getElementById('platform').value;
if(!topic)return;

const hash=topic.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0);
const rng=seeded(Math.abs(hash));

// Find matching category
let category='business';
let bestMatch=0;
for(const[cat,tags]of Object.entries(hashtagDB)){
const match=tags.filter(t=>topic.includes(t.replace('#',''))||t.replace('#','').includes(topic)).length;
if(match>bestMatch){bestMatch=match;category=cat}
}

// Also try partial matches
for(const[cat,tags]of Object.entries(hashtagDB)){
if(cat.includes(topic)||topic.includes(cat)){category=cat;break}
}

const baseTags=hashtagDB[category]||hashtagDB.business;
const limit=limits[platform];

// Mix popular and niche tags
const selected=[];
const shuffled=[...baseTags].sort(()=>rng()-0.5);

// Add topic-specific tags
const topicTag='#'+topic.replace(/\s+/g,'');
if(!shuffled.includes(topicTag))shuffled.unshift(topicTag);

for(let i=0;i<Math.min(limit+5,shuffled.length);i++){
const tag=shuffled[i];
const pop=rng()>0.5?'popular':'niche';
selected.push({tag,pop});
}

document.getElementById('results').innerHTML=`
<div class="stats"><span>📱 ${platform}</span><span>🏷️ ${selected.length} hashtags</span><span>📊 Limit: ${limit}</span></div>
<div class="hashtag-cloud">${selected.map(s=>`<span class="tag" onclick="this.classList.toggle('selected')" title="${s.pop==='popular'?'Popular — high reach':'Niche — targeted audience'}">${s.tag}<span class="${s.pop==='popular'?'tag-pop':'tag-niche'}">${s.pop==='popular'?'🔥':'🎯'}</span></span>`).join('')}</div>
<div class="copy-area"><strong>Copy all hashtags:</strong><textarea id="copyText" readonly>${selected.map(s=>s.tag).join(' ')}</textarea><button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('copyText').value);this.textContent='Copied!';setTimeout(()=>this.textContent='Copy All',1500)">Copy All</button></div>`;
}

document.getElementById('topic').addEventListener('keydown',e=>{if(e.key==='Enter')generate()});
</script>
</body>
</html>
