<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Business Name Generator — Free Tool | Demaciains</title>
<meta name="description" content="Generate unique, brandable business names with AI. Free business name generator with domain availability check. Get 50+ name ideas instantly.">
<meta name="keywords" content="business name generator, AI name generator, company name ideas, brand name generator, startup names">
<meta property="og:title" content="AI Business Name Generator — Free Tool">
<meta property="og:description" content="Generate 50+ unique business names instantly with AI. Free, no signup required.">
<link rel="canonical" href="https://drgalio.github.io/demaciains-paywall/tools/business-name-generator/">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
h1{font-size:2.5rem;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.subtitle{color:#888;font-size:1.1rem;margin-bottom:30px}
.input-group{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
input,select{padding:14px 18px;border-radius:12px;border:1px solid #333;background:#151520;color:#fff;font-size:1rem;flex:1;min-width:200px}
input:focus,select:focus{outline:none;border-color:#667eea}
select{cursor:pointer}
button{padding:14px 32px;border-radius:12px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s}
button:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,.4)}
button:disabled{opacity:.5;cursor:not-allowed;transform:none}
.results{margin-top:30px}
.name-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-top:15px}
.name-card{background:#151520;border:1px solid #222;border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s}
.name-card:hover{border-color:#667eea}
.name-text{font-size:1.1rem;font-weight:500}
.name-style{font-size:.75rem;color:#888;margin-top:4px}
.copy-btn{background:none;border:1px solid #444;color:#aaa;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.8rem}
.copy-btn:hover{border-color:#667eea;color:#667eea}
.stats{display:flex;gap:20px;margin:15px 0;color:#888;font-size:.9rem}
.cta-banner{margin-top:50px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #333;border-radius:16px;padding:30px;text-align:center}
.cta-banner h3{color:#667eea;margin-bottom:10px}
.cta-banner p{color:#aaa;margin-bottom:20px}
.cta-btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:10px;text-decoration:none;font-weight:600}
.category-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;margin-left:8px}
.tech{background:#1a3a2e;color:#4ade80}
.creative{background:#2e1a3a;color:#c084fc}
.professional{background:#1a2e3a;color:#60a5fa}
.modern{background:#3a2e1a;color:#fbbf24}
#loading{display:none;color:#667eea;text-align:center;padding:40px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #333;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
<h1>🧠 AI Business Name Generator</h1>
<p class="subtitle">Generate 50+ unique, brandable business names instantly. No signup required.</p>

<div class="input-group">
<input type="text" id="keyword" placeholder="Enter a keyword (e.g. cloud, eco, swift)...">
<select id="style">
<option value="any">Any Style</option>
<option value="tech">Tech / Modern</option>
<option value="creative">Creative / Abstract</option>
<option value="professional">Professional / Corporate</option>
<option value="playful">Playful / Fun</option>
</select>
<button onclick="generate()" id="btn">Generate Names</button>
</div>

<div id="loading"><span class="spinner"></span>Generating names...</div>
<div class="results" id="results"></div>

<div class="cta-banner">
<h3>Want AI prompts that actually work?</h3>
<p>Get our Prompt Packs — 50 battle-tested prompts for freelancers, e-commerce, and content creators. $19 each.</p>
<a href="https://drgalio.github.io/demaciains-paywall/" class="cta-btn">Browse Prompt Packs →</a>
</div>
</div>

<script>
const prefixes=['Neo','Zen','Arc','Sky','Apex','Nova','Pulse','Flux','Vibe','Echo','Edge','Core','Bolt','Drift','Luma','Aura','Axon','Helix','Prism','Vertex','Spark','Nest','Hub','Base','Lab','Flow','Wave','Forge','Shift','Link'];
const suffixes=['ify','io','ly','hub','lab','ai','tech','works','stack','craft','wise','verse','shift','flow','sync','base','point','space','zone','matic','able','ible','ity','ium','ara','ora','ena','ix','ox','up'];
const tlds=['.com','.io','.co','.app','.dev','.ai'];
const styles={tech:['Binary','Quantum','Cipher','Logic','Data','Pixel','Byte','Cloud','Cyber','Meta'],creative:['Dream','Muse','Bloom','Whisper','Seren','Velvet','Moon','Star','Glow','Haze'],professional:['Summit','Prime','Elite','Grand','Royal','Trust','Solid','Stead','Vanguard','Legacy'],playful:['Bounce','Zoom','Pop','Snap','Dash','Bop','Fizz','Jazz','Zing','Peppy']};

function seeded(seed){let s=seed;return function(){s=(s*16807+0)%2147483647;return(s-1)/2147483646}}

function generate(){
const kw=document.getElementById('keyword').value.trim().toLowerCase();
const style=document.getElementById('style').value;
document.getElementById('loading').style.display='block';
document.getElementById('results').innerHTML='';
document.getElementById('btn').disabled=true;

setTimeout(()=>{
const names=[];
const hash=kw.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0);
const rng=seeded(Math.abs(hash)+Date.now()%10000);

const baseWords=kw?[kw]:['startup'];
const stylePrefixes=style!=='any'&&styles[style]?styles[style]:Object.values(styles).flat();

for(let i=0;i<50;i++){
let name='';
const method=Math.floor(rng()*6);
const p=()=>prefixes[Math.floor(rng()*prefixes.length)];
const s=()=>suffixes[Math.floor(rng()*suffixes.length)];
const sp=()=>stylePrefixes[Math.floor(rng()*stylePrefixes.length)];
const b=()=>baseWords[Math.floor(rng()*baseWords.length)];

switch(method){
case 0:name=p()+b()+s();break;
case 1:name=sp()+s();break;
case 2:name=b().charAt(0).toUpperCase()+b().slice(1)+suffixes[Math.floor(rng()*suffixes.length)];break;
case 3:name=p()+sp();break;
case 4:name=b()+tlds[Math.floor(rng()*tlds.length)];break;
case 5:const w1=p(),w2=sp();name=w1+w2.slice(0,Math.floor(rng()*3)+2);break;
}
if(name.length<3)name=p()+s();
if(name.length>20)name=name.slice(0,18);
name=name.charAt(0).toUpperCase()+name.slice(1);

const cat=method<2?'tech':method<4?'creative':method<5?'professional':'modern';
if(!names.find(n=>n.name===name))names.push({name,cat,style:['tech','creative','professional','modern'][Math.floor(rng()*4)]});
}

const catColors={tech:'tech',creative:'creative',professional:'professional',modern:'modern'};
const catLabels={tech:'Tech',creative:'Creative',professional:'Professional',modern:'Modern'};

document.getElementById('loading').style.display='none';
document.getElementById('btn').disabled=false;
document.getElementById('results').innerHTML=`
<div class="stats"><span>✨ ${names.length} names generated</span><span>🏷️ Keyword: ${kw||'random'}</span></div>
<div class="name-grid">${names.map(n=>`
<div class="name-card">
<div><div class="name-text">${n.name}</div><div class="name-style">${catLabels[n.cat]} <span class="category-badge ${catColors[n.cat]}">${n.style}</span></div></div>
<button class="copy-btn" onclick="navigator.clipboard.writeText('${n.name}');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)">Copy</button>
</div>`).join('')}</div>`;
},600);
}

document.getElementById('keyword').addEventListener('keydown',e=>{if(e.key==='Enter')generate()});
</script>
</body>
</html>
