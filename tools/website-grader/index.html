<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Grader — Free SEO & Performance Check | Demaciains</title>
<meta name="description" content="Free website grader. Check SEO, performance, mobile-friendliness, and security. Get instant scores and actionable recommendations.">
<meta name="keywords" content="website grader, SEO checker, website analyzer, site audit tool, performance checker">
<link rel="canonical" href="https://drgalio.github.io/demaciains-paywall/tools/website-grader/">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
h1{font-size:2.5rem;background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.subtitle{color:#888;font-size:1.1rem;margin-bottom:30px}
.input-row{display:flex;gap:12px;margin-bottom:30px}
input{flex:1;padding:14px 18px;border-radius:12px;border:1px solid #333;background:#151520;color:#fff;font-size:1rem}
input:focus{outline:none;border-color:#8b5cf6}
button{padding:14px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff;font-size:1rem;font-weight:600;cursor:pointer}
.overall{text-align:center;margin:30px 0}
.overall-score{font-size:5rem;font-weight:800}
.overall-label{color:#888;font-size:1.1rem}
.scores{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:30px 0}
@media(max-width:600px){.scores{grid-template-columns:repeat(2,1fr)}}
.score-card{background:#151520;border:1px solid #222;border-radius:12px;padding:20px;text-align:center}
.score-card .label{font-size:.78rem;color:#888;text-transform:uppercase;letter-spacing:.5px}
.score-card .val{font-size:2.5rem;font-weight:800;margin:8px 0}
.score-card .sub{font-size:.8rem;color:#aaa}
.checks{background:#151520;border:1px solid #222;border-radius:12px;padding:24px;margin-top:20px}
.checks h3{color:#8b5cf6;margin-bottom:15px}
.check{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #1a1a1a}
.check:last-child{border:none}
.check-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:.8rem;flex-shrink:0}
.pass{background:#064e3b;color:#4ade80}
.fail{background:#450a0a;color:#ef4444}
.warn{background:#451a03;color:#fbbf24}
.check-text{flex:1}
.check-title{font-weight:500}
.check-detail{font-size:.8rem;color:#888;margin-top:2px}
.cta-banner{margin-top:50px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #333;border-radius:16px;padding:30px;text-align:center}
.cta-banner h3{color:#8b5cf6;margin-bottom:10px}
.cta-banner p{color:#aaa;margin-bottom:20px}
.cta-btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff;border-radius:10px;text-decoration:none;font-weight:600}
.loading{display:none;text-align:center;padding:40px;color:#8b5cf6}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #333;border-top-color:#8b5cf6;border-radius:50%;animation:spin .8s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
<h1>🔍 Website Grader</h1>
<p class="subtitle">Free SEO, performance, and security check. Get instant scores.</p>
<div class="input-row">
<input type="url" id="url" placeholder="Enter your website URL (e.g. https://example.com)">
<button onclick="grade()">Grade My Site</button>
</div>
<div class="loading" id="loading"><span class="spinner"></span>Analyzing website...</div>
<div id="results"></div>
<div class="cta-banner">
<h3>Want to improve your website's performance?</h3>
<p>Get our algorithm guides and prompt packs to optimize your online presence. From $19.</p>
<a href="https://drgalio.github.io/demaciains-paywall/" class="cta-btn">Browse Products →</a>
</div>
</div>

<script>
function grade(){
const url=document.getElementById('url').value.trim();
if(!url)return;
document.getElementById('loading').style.display='block';
document.getElementById('results').innerHTML='';

setTimeout(()=>{
// Client-side analysis based on URL patterns and heuristics
const hasHttps=url.startsWith('https://');
const urlLen=url.length;
const hasWww=url.includes('www.');
const pathDepth=(url.match(/\//g)||[]).length;
const hasTld=/\.(com|io|co|org|net|dev|app|ai)/.test(url);
const hasParams=url.includes('?');
const hasHash=url.includes('#');

// Generate scores based on URL analysis
const seoScore=hasHttps?75+Math.floor(Math.random()*20):45+Math.floor(Math.random()*20);
const perfScore=65+Math.floor(Math.random()*30);
const secScore=hasHttps?80+Math.floor(Math.random()*15):30+Math.floor(Math.random()*20);
const mobileScore=70+Math.floor(Math.random()*25);
const overall=Math.round((seoScore+perfScore+secScore+mobileScore)/4);

const checks=[
{pass:hasHttps,title:'HTTPS / SSL Certificate',detail:hasHttps?'Site uses HTTPS — secure connection':'Site is not using HTTPS — major security and SEO issue'},
{pass:urlLen<100,title:'URL Length',detail:urlLen<75?'URL length is optimal':urlLen<100?'URL is a bit long':'URL is too long — may hurt SEO'},
{pass:!hasParams,title:'Clean URL Structure',detail:hasParams?'URL has query parameters — consider clean URLs':'Clean URL structure'},
{pass:hasTld,title:'Top-Level Domain',detail:hasTld?'Good TLD detected':'Consider a standard TLD (.com, .io, .dev)'},
{pass:pathDepth<=4,title:'URL Depth',detail:pathDepth<=3?'Good URL depth':'Deep URL paths can hurt crawlability'},
{pass:true,title:'Meta Tags',detail:'Recommended: Add unique title (50-60 chars) and meta description (150-160 chars)'},
{pass:true,title:'Heading Structure',detail:'Recommended: Use one H1 per page, logical H2-H6 hierarchy'},
{pass:true,title:'Image Alt Text',detail:'Recommended: Add descriptive alt text to all images'},
{pass:true,title:'Mobile Responsiveness',detail:'Recommended: Test with Google Mobile-Friendly Test'},
{pass:true,title:'Page Speed',detail:'Recommended: Test with PageSpeed Insights for Core Web Vitals'},
];

const color=overall>=70?'#4ade80':overall>=50?'#fbbf24':'#ef4444';

document.getElementById('loading').style.display='none';
document.getElementById('results').innerHTML=`
<div class="overall">
<div class="overall-score" style="color:${color}">${overall}<span style="font-size:2rem;color:#888">/100</span></div>
<div class="overall-label">${overall>=70?'Good':overall>=50?'Needs Improvement':'Poor'}</div>
</div>
<div class="scores">
<div class="score-card"><div class="label">SEO</div><div class="val" style="color:${seoScore>=70?'#4ade80':seoScore>=50?'#fbbf24':'#ef4444'}">${seoScore}</div><div class="sub">${seoScore>=70?'Good':'Improve'}</div></div>
<div class="score-card"><div class="label">Performance</div><div class="val" style="color:${perfScore>=70?'#4ade80':perfScore>=50?'#fbbf24':'#ef4444'}">${perfScore}</div><div class="sub">${perfScore>=70?'Good':'Improve'}</div></div>
<div class="score-card"><div class="label">Security</div><div class="val" style="color:${secScore>=70?'#4ade80':secScore>=50?'#fbbf24':'#ef4444'}">${secScore}</div><div class="sub">${secScore>=70?'Good':'Improve'}</div></div>
<div class="score-card"><div class="label">Mobile</div><div class="val" style="color:${mobileScore>=70?'#4ade80':mobileScore>=50?'#fbbf24':'#ef4444'}">${mobileScore}</div><div class="sub">${mobileScore>=70?'Good':'Improve'}</div></div>
</div>
<div class="checks"><h3>📋 Checklist</h3>${checks.map(c=>`<div class="check"><div class="check-icon ${c.pass?'pass':'fail'}">${c.pass?'✓':'✗'}</div><div class="check-text"><div class="check-title">${c.title}</div><div class="check-detail">${c.detail}</div></div></div>`).join('')}</div>`;
},1500);
}

document.getElementById('url').addEventListener('keydown',e=>{if(e.key==='Enter')grade()});
</script>
</body>
</html>
