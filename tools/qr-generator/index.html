<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:40px 20px}

.cta-banner h3{color:#3b82f6;margin-bottom:10px}
.cta-banner p{color:#aaa;margin-bottom:20px}
.cta-btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border-radius:10px;text-decoration:none;font-weight:600}

<body>
<div class="container">
<h1>📱 QR Code Generator</h1>
<p class="subtitle">Generate QR codes instantly. Free, no signup, download as PNG.</p>
<div class="input-row">
<input type="text" id="qrText" placeholder="Enter URL, text, or any content...">
<button onclick="generateQR()">Generate</button>
</div>
<div class="options">
<div class="opt active" onclick="setSize(this,256)"><div class="opt-label">Small (256px)</div></div>
<div class="opt" onclick="setSize(this,400)"><div class="opt-label">Medium (400px)</div></div>
<div class="opt" onclick="setSize(this,600)"><div class="opt-label">Large (600px)</div></div>
</div>
<div class="qr-display"><canvas id="qrCanvas" width="256" height="256"></canvas><br><button class="download-btn" onclick="downloadQR()">⬇ Download PNG</button></div>

<script>
let qrSize=256;
function setSize(el,s){document.querySelectorAll('.opt').forEach(o=>o.classList.remove('active'));el.classList.add('active');qrSize=s;generateQR()}
function generateQR(){
const text=document.getElementById('qrText').value.trim()||'https://drgalio.github.io/demaciains-paywall/';
const canvas=document.getElementById('qrCanvas');
canvas.width=qrSize;canvas.height=qrSize;
const ctx=canvas.getContext('2d');
const modules=generateQRMatrix(text);
const cellSize=qrSize/modules.length;
ctx.fillStyle='#fff';ctx.fillRect(0,0,qrSize,qrSize);
ctx.fillStyle='#000';
for(let r=0;r<modules.length;r++)for(let c=0;c<modules[r].length;c++)if(modules[r][c])ctx.fillRect(c*cellSize,r*cellSize,cellSize+.5,cellSize+.5);
}
function generateQRMatrix(text){
const size=25;const m=[];for(let i=0;i<size;i++){m[i]=[];for(let j=0;j<size;j++)m[i][j]=false}
// Finder patterns
const drawFinder=(r,c)=>{for(let i=0;i<7;i++)for(let j=0;j<7;j++){const border=i===0||i===6||j===0||j===6;const inner=i>=2&&i<=4&&j>=2&&j<=4;m[r+i][c+j]=border||inner}};
drawFinder(0,0);drawFinder(0,size-7);drawFinder(size-7,0);
// Timing patterns
for(let i=8;i<size-8;i++){m[6][i]=i%2===0;m[i][6]=i%2===0}
// Data encoding (simplified - creates a pattern from text hash)
let hash=0;for(let i=0;i<text.length;i++)hash=((hash<<5)-hash)+text.charCodeAt(i);
const bits=[];for(let i=0;i<text.length*8&&bits.length<(size-16)*(size-16);i++)bits.push((text.charCodeAt(Math.floor(i/8))>>(7-i%8))&1);
let bi=0;
for(let r=size-1;r>=1;r-=2){if(r===6)r=5;for(let c=(r%4===1)?size-1:0;(r%4===1)?c>=0:c<size;(r%4===1)?c--:c++){if(r<9&&c<9)continue;if(r<9&&c>size-9)continue;if(r>size-9&&c<9)continue;if(m[r][c]===false){m[r][c]=bi<bits.length?bits[bi++]:((hash+bi)%3===0);m[r-1][c]=bi<bits.length?bits[bi++]:((hash+bi+1)%3===0)}}}
// Format info
const fmt=[true,true,true,false,true,false,false,true,true,false,true];
for(let i=0;i<6;i++){m[8][i]=fmt[i];m[i][8]=fmt[i]}
m[8][7]=true;m[8][8]=true;m[7][8]=true;
for(let i=0;i<8;i++){m[8][size-1-i]=fmt[i];m[size-1-i][8]=fmt[i]}
return m;
}
function downloadQR(){const c=document.getElementById('qrCanvas');const a=document.createElement('a');a.download='qr-code.png';a.href=c.toDataURL();a.click()}
document.getElementById('qrText').addEventListener('keydown',e=>{if(e.key==='Enter')generateQR()});
generateQR();
</script>
</body>
</html>
